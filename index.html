<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060a18">
<title>상인 키우기 타이쿤</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Noto+Serif+KR:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--sky:#060a18;--sky2:#0c1228;--gold:#e8c860;--gold2:#b09030;--gold3:#806820;
--frost:#88bbdd;--hp:#66cc88;--mp:#5599dd;--dmg:#cc6655;--xp:#ddbb44;
--warm:#ffe0b0;--txt:#dce0ec;--txt2:#a0a8c0;--dim:#606880;
--card:rgba(12,18,40,.88);--edge:rgba(100,120,160,.2);
--rare:#5599dd;--epic:#9966cc;--legend:#ddaa44}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--sky);color:var(--txt);min-height:100vh;overflow-x:hidden;font-size:15px;line-height:1.6}
.sky-layer,.snow-layer{position:fixed;inset:0;pointer-events:none}.sky-layer{z-index:0}.snow-layer{z-index:1}
.sky-layer canvas,.snow-layer canvas{width:100%;height:100%}
.content{position:relative;z-index:2}

/* ══ TYCOON HUD (game-style top bar) ══ */
.t-hud{display:flex;justify-content:center;gap:4px;padding:8px 12px;background:linear-gradient(180deg,rgba(6,10,24,.97),rgba(12,18,40,.92));border-bottom:1px solid var(--edge);position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);flex-wrap:wrap;align-items:center}
.t-hud-title{font-family:'Noto Serif KR';font-size:clamp(12px,2.5vw,16px);color:var(--warm);letter-spacing:2px;margin-right:8px;font-weight:700}
.t-res{display:flex;align-items:center;gap:2px;background:rgba(0,0,0,.35);border:1px solid var(--edge);border-radius:20px;padding:3px 10px 3px 6px;font-size:11px;position:relative;overflow:hidden}
.t-res::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.03),transparent);animation:resShine 4s ease-in-out infinite}
@keyframes resShine{0%{left:-100%}100%{left:200%}}
.t-res .ri{font-size:14px}.t-res .rv{font-weight:900;color:var(--gold)}
.t-res-up .rv{color:var(--hp)}.t-res-dn .rv{color:var(--dmg)}

.wrap{max-width:920px;margin:0 auto;padding:8px 12px}
.sec{display:flex;align-items:center;gap:8px;margin:22px 0 10px}
.sec-l{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--edge),transparent)}
.sec-t{font-family:'Noto Serif KR',serif;font-size:13px;color:var(--warm);white-space:nowrap;letter-spacing:1px}
.refresh{text-align:center;padding:3px;font-size:10px;color:var(--dim)}
.refresh button{background:rgba(0,0,0,.2);border:1px solid var(--edge);color:var(--gold);padding:2px 6px;border-radius:3px;cursor:pointer;font-size:9px;margin-left:3px}

/* ══ TYCOON SCENE ══ */
.scene{position:relative;border-radius:16px;overflow:hidden;height:340px;background:linear-gradient(180deg,#040810,#081020 40%,#0c1830 70%,#101c38);border:1px solid var(--edge)}
.scene canvas#tycoonCv{position:absolute;inset:0;width:100%;height:100%;z-index:1}
/* coin particles overlay */
.coin-layer{position:absolute;inset:0;z-index:2;pointer-events:none}
.coin-layer canvas{width:100%;height:100%}
/* quote bubble */
.scene-quote{position:absolute;bottom:10px;left:10px;right:10px;z-index:10;background:rgba(6,10,24,.88);border:1px solid rgba(255,224,176,.1);border-radius:12px;padding:10px 14px;backdrop-filter:blur(10px)}
.sq-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sq-name{font-family:'Noto Serif KR';font-size:12px;color:var(--warm)}
.sq-zone{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700}
.sq-body{font-family:'Noto Serif KR';font-size:clamp(13px,2.5vw,16px);color:var(--txt);line-height:1.6}
.sq-body em{color:var(--gold);font-style:normal;font-weight:700}
.sq-stats{display:flex;gap:10px;margin-top:6px;font-size:11px;flex-wrap:wrap}
.sq-stat{display:flex;align-items:center;gap:3px}.sq-sv{font-weight:700}

/* ══ SKILLS (compact tycoon style) ══ */
.skills{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.skill{background:var(--card);border:1px solid var(--edge);border-radius:10px;padding:8px 4px;text-align:center;backdrop-filter:blur(8px);transition:all .3s;position:relative;overflow:hidden}
.skill:hover{border-color:var(--gold3);transform:translateY(-2px)}
.skill-icon{font-size:18px;margin-bottom:1px}.skill-name{font-size:9px;font-weight:700;color:var(--txt2);margin-bottom:1px}
.skill-val{font-size:12px;font-weight:900}
.skill-bar{height:3px;background:rgba(0,0,0,.3);border-radius:2px;overflow:hidden;margin-top:3px}
.skill-fill{height:100%;border-radius:2px}

/* ══ WEATHER ══ */
.wx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.wx{border-radius:10px;padding:12px 6px;text-align:center;transition:all .4s;border:2px solid transparent;min-height:90px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.wx:hover{transform:translateY(-2px)}.wx.wa{transform:scale(1.02)}
.wx-clear{background:linear-gradient(180deg,#0c1430,#081020)}.wx-clear.wa{border-color:var(--gold);box-shadow:0 0 16px rgba(232,200,96,.05)}
.wx-bliz{background:linear-gradient(180deg,#101828,#0a1018)}.wx-bliz.wa{border-color:var(--frost);box-shadow:0 0 16px rgba(136,187,221,.05)}
.wx-storm{background:linear-gradient(180deg,#0c0c18,#060610)}.wx-storm.wa{border-color:var(--dmg);box-shadow:0 0 16px rgba(204,102,85,.05)}
.wx canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.wx-ct{position:relative;z-index:2}.wx-ic{font-size:26px;margin-bottom:2px}
.wx-nm{font-family:'Noto Serif KR';font-size:12px;font-weight:700;margin-bottom:1px}
.wx-ds{font-size:9px;color:var(--dim)}.wx-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:4px;display:inline-block}

/* ══ GOODS ══ */
.goods{display:flex;flex-direction:column;gap:5px}
.good{background:var(--card);border:1px solid var(--edge);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(8px);transition:all .3s;position:relative;overflow:hidden}
.good:hover{border-color:rgba(232,200,96,.1);background:rgba(16,22,48,.95)}
.good::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.good-rare::before{background:var(--rare)}.good-epic::before{background:var(--epic)}.good-legend::before{background:var(--legend)}
.good-icon{font-size:20px;flex-shrink:0;width:26px;text-align:center}
.good-info{flex:1}.good-name{font-size:12px;font-weight:700;margin-bottom:1px;display:flex;align-items:center;gap:4px}
.good-name .g-rank{font-size:8px;padding:1px 3px;border-radius:2px}
.good-detail{font-size:10px;color:var(--txt2)}
.good-bar-wrap{display:flex;align-items:center;gap:4px;margin-top:3px}
.good-bar{flex:1;height:4px;background:rgba(0,0,0,.25);border-radius:2px;overflow:hidden}
.good-fill{height:100%;border-radius:2px}
.gf-profit{background:linear-gradient(90deg,#448844,#66cc88)}.gf-wait{background:linear-gradient(90deg,#886620,#ccaa44)}.gf-loss{background:linear-gradient(90deg,#884444,#cc6655)}
.good-days{font-size:8px;color:var(--dim)}.good-pnl{font-size:14px;font-weight:900;width:55px;text-align:right;flex-shrink:0}
.good-pnl.win{color:var(--hp)}.good-pnl.lose{color:var(--dmg)}

/* ══ ORDERS ══ */
.ord-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ord-col{background:var(--card);border:1px solid var(--edge);border-radius:10px;padding:10px;backdrop-filter:blur(8px)}
.ord-col h3{font-size:11px;font-weight:700;margin-bottom:6px;text-align:center;padding:4px;border-radius:4px}
.ord-col.buy-c h3{color:var(--mp);background:rgba(85,153,221,.04)}
.ord-col.sell-c h3{color:var(--legend);background:rgba(221,170,68,.04)}
.ord-row{display:flex;justify-content:space-between;padding:5px 8px;margin-bottom:2px;background:rgba(0,0,0,.08);border-radius:4px;border-left:2px solid;font-size:11px}
.buy-c .ord-row{border-color:var(--mp)}.sell-c .ord-row{border-color:var(--legend)}
.ord-type{font-size:8px;color:var(--dim);margin-left:3px}

/* ══ QUEUE ══ */
.queue-wrap{background:var(--card);border:1px solid var(--edge);border-radius:12px;padding:12px;backdrop-filter:blur(8px);overflow-x:auto}
.queue{display:flex;gap:6px;align-items:flex-end;min-height:80px}
.q-person{text-align:center;flex-shrink:0;width:58px;animation:qw .7s ease-in-out infinite alternate;position:relative}
.q-person:nth-child(odd){animation-delay:.15s}
@keyframes qw{0%{transform:translateY(0)}100%{transform:translateY(-2px)}}
.q-avatar{font-size:24px;margin-bottom:1px}.q-want{font-size:8px;color:var(--gold);font-weight:700;background:rgba(232,200,96,.06);padding:1px 3px;border-radius:2px;display:inline-block}
.q-qty{font-size:8px;color:var(--dim)}.q-num{position:absolute;top:-5px;left:50%;transform:translateX(-50%);font-size:6px;font-weight:900;background:var(--gold);color:var(--sky);padding:0 3px;border-radius:2px}
.q-stall{flex-shrink:0;width:36px;text-align:center;font-size:20px}

/* ══ CUSTOMERS ══ */
.cust-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.cust{background:var(--card);border:1px solid var(--edge);border-radius:10px;padding:10px 8px;backdrop-filter:blur(8px);transition:all .3s;position:relative;overflow:hidden;text-align:center}
.cust:hover{transform:translateY(-2px);border-color:rgba(232,200,96,.1)}
.cust::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.cust-s::before{background:var(--hp)}.cust-m::before{background:var(--mp)}.cust-l::before{background:var(--epic)}
.cust-emoji{font-size:28px;margin-bottom:3px;display:block}
.cust-nm{font-size:11px;font-weight:700;margin-bottom:1px}.cust-stars{font-size:8px;color:var(--gold);margin-bottom:3px;display:block}
.cust-tier-badge{position:absolute;top:4px;right:4px;font-size:7px;font-weight:900;background:var(--gold);color:var(--sky);padding:0 3px;border-radius:2px}
.cust-quote{font-size:8px;color:var(--dim);font-style:italic;line-height:1.3}

/* ══ DRINKS ══ */
.drink-wrap{background:var(--card);border:1px solid var(--edge);border-radius:12px;padding:12px;backdrop-filter:blur(8px)}
.drink-progress{display:flex;align-items:center;margin-bottom:10px;gap:5px;font-size:11px}
.drink-bar{flex:1;height:8px;background:rgba(0,0,0,.25);border-radius:4px;overflow:hidden;border:1px solid var(--edge)}
.drink-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#88bbdd,#ddbb44,#cc6644);transition:width 2s}
.drink-status{font-weight:700;color:var(--gold);font-size:10px}
.drinks{display:flex;gap:0}.drink{flex:1;text-align:center;padding:6px 2px;position:relative;border-radius:8px;transition:all .3s}
.drink.locked{opacity:.2;filter:grayscale(.6)}.drink.current{background:rgba(232,200,96,.04);border:1px solid var(--gold3)}
.drink-icon{font-size:24px;display:block;margin-bottom:1px}.drink.current .drink-icon{animation:drB 2s ease-in-out infinite}
@keyframes drB{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.drink-name{font-size:8px;font-weight:700}.drink-req{font-size:7px;color:var(--dim)}
.drink-check{position:absolute;top:2px;right:2px;font-size:7px}

/* ══ CHAT ══ */
.chat-wrap{background:var(--card);border:1px solid var(--edge);border-radius:12px;overflow:hidden;backdrop-filter:blur(8px)}
.chat-head{padding:8px 10px;border-bottom:1px solid var(--edge);display:flex;justify-content:space-between;align-items:center}
.chat-title{font-family:'Noto Serif KR';font-size:12px;color:var(--warm)}
.chat-btn{background:rgba(0,0,0,.2);border:1px solid var(--edge);color:var(--gold);padding:2px 5px;border-radius:3px;cursor:pointer;font-size:9px}
.chat-body{padding:8px 10px;max-height:240px;overflow-y:auto}
.chat-body::-webkit-scrollbar{width:2px}.chat-body::-webkit-scrollbar-thumb{background:var(--edge);border-radius:2px}
.msg{display:flex;gap:6px;margin-bottom:7px;opacity:0;animation:mi .4s ease forwards}@keyframes mi{to{opacity:1}}
.msg-avatar{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid var(--edge);background:var(--card)}
.msg-content{flex:1}.msg-name{font-size:7px;color:var(--dim);margin-bottom:1px}
.msg-bubble{background:rgba(255,255,255,.03);border:1px solid var(--edge);border-radius:0 8px 8px 8px;padding:5px 8px;font-size:11px;line-height:1.5}
.msg-buy .msg-bubble{border-color:rgba(85,153,221,.1);background:rgba(85,153,221,.02)}
.msg-sell .msg-bubble{border-color:rgba(232,200,96,.1);background:rgba(232,200,96,.02)}
.msg-profit .msg-bubble{border-color:rgba(102,204,136,.1);background:rgba(102,204,136,.02)}
.msg-loss .msg-bubble{border-color:rgba(204,102,85,.1);background:rgba(204,102,85,.02)}
.msg-sys .msg-bubble{background:rgba(255,224,176,.02);border-color:rgba(255,224,176,.06);text-align:center;font-size:9px;color:var(--warm)}

.fab{position:fixed;bottom:14px;right:14px;z-index:50;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--gold2),var(--gold));border:2px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;box-shadow:0 3px 10px rgba(200,160,60,.2);transition:all .3s}
.fab:hover{transform:scale(1.1)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}.modal-bg.open{display:flex}
.modal{background:var(--sky2);border:1px solid var(--edge);border-radius:14px;padding:20px;width:90%;max-width:330px;position:relative}
.modal h2{font-family:'Noto Serif KR';font-size:14px;color:var(--warm);text-align:center;margin-bottom:12px}
.modal-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer}
.m-tabs{display:flex;gap:0;margin-bottom:10px}.m-tab{flex:1;padding:7px;text-align:center;cursor:pointer;font-size:11px;font-weight:700;border:1px solid var(--edge);transition:all .3s}
.m-tab:first-child{border-radius:6px 0 0 6px}.m-tab:last-child{border-radius:0 6px 6px 0}
.m-tab.t-buy.on{background:var(--mp);color:#fff;border-color:var(--mp)}.m-tab.t-sell.on{background:var(--legend);color:#fff;border-color:var(--legend)}
.m-field{margin-bottom:8px}.m-field label{display:block;font-size:10px;color:var(--dim);margin-bottom:2px}
.m-field input{width:100%;padding:9px;background:rgba(0,0,0,.2);border:1px solid var(--edge);border-radius:6px;color:var(--txt);font-size:13px;outline:none}
.m-submit{width:100%;padding:10px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;margin-top:2px}
.m-submit.buy-btn{background:var(--mp);color:#fff}.m-submit.sell-btn{background:var(--legend);color:#fff}
.m-msg{text-align:center;margin-top:5px;font-size:10px;padding:4px;border-radius:4px}
.m-msg.ok{background:rgba(102,204,136,.06);color:var(--hp)}.m-msg.err{background:rgba(204,102,85,.06);color:var(--dmg)}
footer{text-align:center;padding:12px;color:var(--dim);font-size:8px;border-top:1px solid var(--edge);margin-top:16px}
@media(max-width:640px){.ord-grid{grid-template-columns:1fr}.wx-grid{grid-template-columns:1fr}.cust-grid{grid-template-columns:repeat(4,1fr)}.drinks{flex-wrap:wrap}.skills{grid-template-columns:repeat(3,1fr)}}
@media(max-width:400px){.cust-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="sky-layer"><canvas id="skyCv"></canvas></div>
<div class="snow-layer"><canvas id="snowCv"></canvas></div>
<div class="content">
<div class="t-hud" id="tHud"><span class="t-hud-title">❄상인 키우기 타이쿤</span></div>
<div class="wrap">
  <div class="refresh" id="refreshBar">--<button onclick="loadAll()">🔄</button></div>
  <div class="scene"><canvas id="tycoonCv"></canvas><div class="coin-layer"><canvas id="coinCv"></canvas></div><div class="scene-quote" id="sceneQuote"></div></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">⚔ 능력</span><div class="sec-l"></div></div><div class="skills" id="skills"></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">🌨 날씨</span><div class="sec-l"></div></div><div class="wx-grid" id="wxGrid"></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">📦 진열 상품</span><div class="sec-l"></div></div><div class="goods" id="goods"></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">📋 주문표 (퉁치기)</span><div class="sec-l"></div></div><div class="ord-grid" id="orders"></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">🧍 손님 대기줄</span><div class="sec-l"></div></div><div class="queue-wrap" id="queueWrap"></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">🧑‍🤝‍🧑 단골손님</span><div class="sec-l"></div></div><div class="cust-grid" id="custGrid"></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">☕ 음료</span><div class="sec-l"></div></div><div class="drink-wrap" id="drinkWrap"></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">🔥 모닥불 채팅</span><div class="sec-l"></div></div>
  <div class="chat-wrap"><div class="chat-head"><span class="chat-title">화로 옆 이야기</span><button class="chat-btn" onclick="loadAll()">🔄</button></div><div class="chat-body" id="chatBody"></div></div>
</div>
<div class="fab" onclick="openModal()">💰</div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal"><button class="modal-close" onclick="closeModal()">✕</button><h2>💰 매입 / 판매</h2><div class="m-tabs"><div class="m-tab t-buy on" onclick="setTT('buy')">매입</div><div class="m-tab t-sell" onclick="setTT('sell')">판매</div></div><div class="m-field"><label>가격 ($)</label><input type="number" id="tPrice" step="0.01"></div><div class="m-field"><label>수량</label><input type="number" id="tQty" step="1"></div><button class="m-submit buy-btn" id="tSubmit" onclick="submitT()">매입 기록</button><div id="tMsg"></div></div></div>
<footer>⚠ 과거 성과가 미래를 보장하지 않습니다 · v6.2</footer>
</div>
<script>
var API_URL='https://script.google.com/macros/s/AKfycbzcnC0z7N2iCLOf1egqJtbb9YGL4NVM5EzbcWyL-DWt8H5y1TTigh73gEnYTSORsnKJ/exec';
var dashData=null,ordData=null,tradeType='buy';
function fetchAPI(a){return new Promise(function(res){if(API_URL==='YOUR_APPS_SCRIPT_URL_HERE'){res(null);return}var cb='jp_'+Date.now()+'_'+Math.floor(Math.random()*1e4);var to=setTimeout(function(){window[cb]=function(){};res(null)},15000);window[cb]=function(d){clearTimeout(to);res(d);delete window[cb];var e=document.getElementById(cb);if(e)e.remove()};var s=document.createElement('script');s.id=cb;s.src=API_URL+'?action='+a+'&callback='+cb;s.onerror=function(){clearTimeout(to);res(null);delete window[cb];s.remove()};document.head.appendChild(s)})}

// ══ STARS ══
!function(){var cv=document.getElementById('skyCv'),c=cv.getContext('2d');function r(){cv.width=innerWidth*2;cv.height=innerHeight*2}r();addEventListener('resize',r);var s=[];for(var i=0;i<130;i++)s.push({x:Math.random()*4000,y:Math.random()*4000,r:Math.random()*1.3+.2,a:Math.random(),sp:Math.random()*.003+.001});!function d(){c.clearRect(0,0,cv.width,cv.height);s.forEach(function(p){p.a+=p.sp;c.fillStyle='rgba(200,215,240,'+(0.12+0.45*Math.abs(Math.sin(p.a)))+')';c.beginPath();c.arc(p.x,p.y,p.r,0,Math.PI*2);c.fill()});requestAnimationFrame(d)}()}();
// ══ SNOW ══

      }

    });
    // merchant AI
    mwait--;

      if(mstate==='idle'){var r=Math.random();if(r<.25){mstate='walk';mtarget=targets[Math.floor(Math.random()*4)]}else if(r<.4){mstate='serve';mwait=90}else{mwait=50+Math.random()*80}}

      if(mstate==='serve'&&mwait<=0){mstate='idle';mwait=30;if(typeof spawnCoins==='function')spawnCoins(5)}
    }

    requestAnimationFrame(animate)}
  animate();
}();

    else div.innerHTML='<div class="msg-avatar">'+m.av+'</div><div class="msg-content"><div class="msg-name">'+m.nm+'</div><div class="msg-bubble">'+m.text+'</div></div>';
    el.appendChild(div);el.scrollTop=el.scrollHeight},delay);delay+=350})}

function openModal(){document.getElementById('modalBg').classList.add('open')}
function closeModal(){document.getElementById('modalBg').classList.remove('open');document.getElementById('tMsg').innerHTML=''}
function setTT(t){tradeType=t;document.querySelectorAll('.m-tab').forEach(function(el){el.classList.remove('on')});document.querySelector(t==='buy'?'.t-buy':'.t-sell').classList.add('on');document.getElementById('tSubmit').textContent=t==='buy'?'매입':'판매';document.getElementById('tSubmit').className='m-submit '+(t==='buy'?'buy-btn':'sell-btn')}
async function submitT(){var price=document.getElementById('tPrice').value,qty=document.getElementById('tQty').value,me=document.getElementById('tMsg');if(!price||!qty){me.innerHTML='<div class="m-msg err">입력 필요</div>';return}if(API_URL==='YOUR_APPS_SCRIPT_URL_HERE'){me.innerHTML='<div class="m-msg err">API 미설정</div>';return}me.innerHTML='<div class="m-msg" style="color:var(--dim)">...</div>';try{var r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:tradeType==='buy'?'record_buy':'record_sell',가격:parseFloat(price),수량:parseInt(qty)})});var data=await r.json();if(data.상태==='OK'){me.innerHTML='<div class="m-msg ok">✅ '+data.메시지+'</div>';if(typeof spawnCoins==='function')spawnCoins(12);setTimeout(function(){closeModal();loadAll()},1500)}else me.innerHTML='<div class="m-msg err">❌ '+(data.메시지||'오류')+'</div>'}catch(e){me.innerHTML='<div class="m-msg err">❌ '+e.message+'</div>'}}
loadAll();
</script>
</body>
