<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060a18">
<title>상인 키우기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Noto+Serif+KR:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--sky:#060a18;--sky2:#0c1228;--gold:#e8c860;--gold2:#b09030;--gold3:#806820;
--frost:#88bbdd;--hp:#66cc88;--mp:#5599dd;--dmg:#cc6655;--xp:#ddbb44;
--txt:#dce0ec;--txt2:#a0a8c0;--dim:#606880;
--card:rgba(12,18,40,.88);--edge:rgba(100,120,160,.2);
--rare:#5599dd;--epic:#9966cc;--legend:#ddaa44;--warm:#ffe0b0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--sky);color:var(--txt);min-height:100vh;overflow-x:hidden;font-size:15px;line-height:1.6}
.sky-layer{position:fixed;inset:0;pointer-events:none;z-index:0}.sky-layer canvas{width:100%;height:100%}
.snow-layer{position:fixed;inset:0;pointer-events:none;z-index:1}.snow-layer canvas{width:100%;height:100%}
.content{position:relative;z-index:2}
.header{text-align:center;padding:16px 16px 12px;background:linear-gradient(180deg,rgba(6,10,24,.96),rgba(12,18,40,.9));border-bottom:1px solid var(--edge);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header h1{font-family:'Noto Serif KR',serif;font-size:clamp(17px,3.5vw,24px);color:var(--warm);letter-spacing:3px;font-weight:700;text-shadow:0 0 15px rgba(255,170,80,.15)}
.h-sub{font-size:11px;color:var(--dim);margin-top:2px;letter-spacing:2px}
.hud{display:flex;justify-content:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.hud-item{display:flex;align-items:center;gap:3px;background:rgba(0,0,0,.25);border:1px solid var(--edge);border-radius:8px;padding:4px 10px;font-size:12px}
.hud-item .hi{font-size:14px}.hud-item .hv{font-weight:700;color:var(--gold)}
.wrap{max-width:920px;margin:0 auto;padding:14px}
.sec{display:flex;align-items:center;gap:12px;margin:28px 0 14px}
.sec-l{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--edge),transparent)}
.sec-t{font-family:'Noto Serif KR',serif;font-size:15px;color:var(--warm);white-space:nowrap;letter-spacing:2px}
.loading{text-align:center;padding:30px;font-size:14px;color:var(--dim)}
.loading .spinner{font-size:20px;animation:spin 2s ease-in-out infinite;display:block;margin-bottom:8px}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.refresh{text-align:center;padding:6px;font-size:12px;color:var(--dim)}
.refresh button{background:rgba(0,0,0,.2);border:1px solid var(--edge);color:var(--gold);padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px;margin-left:6px}

/* SCENE */
.scene{position:relative;border-radius:20px;overflow:hidden;min-height:320px;background:linear-gradient(180deg,var(--sky),#0a1028 30%,#101830 60%,#141c38);border:1px solid var(--edge)}
.scene canvas.sbg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
.scene-ground{position:absolute;bottom:0;left:0;right:0;height:70px;z-index:2;background:linear-gradient(180deg,rgba(200,210,230,.06),rgba(180,195,220,.1),rgba(160,180,210,.13))}
.scene-glow{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);width:50%;height:30%;z-index:2;background:radial-gradient(ellipse,rgba(255,170,80,.05),transparent);animation:sg 4s ease-in-out infinite;pointer-events:none}
@keyframes sg{0%,100%{opacity:.4}50%{opacity:.8}}
.scene-ct{position:relative;z-index:10;display:flex;padding:16px;gap:16px;align-items:flex-start;flex-wrap:wrap;min-height:320px}

/* CHAR */
.char-card{width:155px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px}
.char-frame{width:148px;background:var(--card);border:2px solid var(--gold3);border-radius:14px;padding:10px;text-align:center;backdrop-filter:blur(8px);position:relative;overflow:hidden}
.char-frame::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.char-frame canvas{image-rendering:pixelated;width:80px;height:96px;display:block;margin:0 auto 6px}
.char-nm{font-family:'Noto Serif KR';font-size:13px;color:var(--warm);font-weight:700}
.char-title{font-size:10px;color:var(--dim);margin-bottom:8px}
.cb{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.cb-icon{font-size:10px;width:14px;text-align:center}.cb-label{font-size:9px;color:var(--dim);width:22px}
.cb-track{flex:1;height:5px;background:rgba(0,0,0,.3);border-radius:3px;overflow:hidden}
.cb-fill{height:100%;border-radius:3px}.cb-val{font-size:8px;font-weight:700;width:20px;text-align:right}
.lv-ring{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold3),var(--gold));display:flex;align-items:center;justify-content:center;border:2px solid var(--gold);box-shadow:0 0 10px rgba(232,200,96,.2);font-size:11px;font-weight:900;color:var(--sky)}
.brazier-wrap{width:56px;height:34px;margin-top:2px}.brazier-wrap canvas{image-rendering:pixelated;width:100%;height:100%}

/* TREASURY */
.treasury{background:var(--card);border:1px solid var(--edge);border-radius:16px;padding:18px;flex:1;min-width:240px;backdrop-filter:blur(8px)}
.tr-label{font-family:'Noto Serif KR';font-size:13px;color:var(--dim);margin-bottom:4px}
.tr-amount{font-size:clamp(22px,4.5vw,32px);font-weight:900;color:var(--gold);margin-bottom:3px;text-shadow:0 0 10px rgba(232,200,96,.12)}
.tr-sub{font-size:13px;color:var(--txt2);margin-bottom:10px}
.tr-sub .up{color:var(--hp);font-weight:700}.tr-sub .dn{color:var(--dmg);font-weight:700}
.gold-track{height:16px;background:rgba(0,0,0,.25);border-radius:8px;overflow:hidden;border:1px solid var(--edge);margin:6px 0}
.gold-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#5a3808,#a08020,#ccaa30,#e8c860);transition:width 2s;position:relative}
.gold-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent 50%)}
.xp-wrap{margin-top:8px}.xp-label{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-bottom:2px}
.xp-track{height:10px;background:rgba(0,0,0,.25);border-radius:5px;overflow:hidden;border:1px solid var(--edge)}
.xp-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#886620,#bbaa30,#ddcc44);transition:width 2s}
.tr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.tg{background:rgba(0,0,0,.15);border-radius:8px;padding:8px 6px;text-align:center;border:1px solid var(--edge)}
.tg-v{font-size:15px;font-weight:900;margin-bottom:1px}.tg-l{font-size:10px;color:var(--dim)}

/* SKILLS */
.skills{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.skill{background:var(--card);border:1px solid var(--edge);border-radius:12px;padding:12px 8px;text-align:center;backdrop-filter:blur(8px);transition:all .3s}
.skill:hover{border-color:var(--gold3);transform:translateY(-2px)}
.skill-icon{font-size:22px;margin-bottom:3px}.skill-name{font-size:12px;font-weight:700;margin-bottom:2px}
.skill-val{font-size:14px;font-weight:900;margin-bottom:2px}.skill-desc{font-size:10px;color:var(--dim)}
.skill-bar{height:4px;background:rgba(0,0,0,.3);border-radius:2px;overflow:hidden;margin-top:5px}
.skill-fill{height:100%;border-radius:2px}

/* WEATHER */
.wx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.wx{border-radius:14px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .4s;border:2px solid transparent;min-height:120px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.wx:hover{transform:translateY(-2px)}.wx.wa{transform:scale(1.02)}
.wx-clear{background:linear-gradient(180deg,#0c1430,#081020)}.wx-clear.wa{border-color:var(--gold);box-shadow:0 0 20px rgba(232,200,96,.08)}
.wx-bliz{background:linear-gradient(180deg,#101828,#0a1018)}.wx-bliz.wa{border-color:var(--frost);box-shadow:0 0 20px rgba(136,187,221,.08)}
.wx-storm{background:linear-gradient(180deg,#0c0c18,#060610)}.wx-storm.wa{border-color:var(--dmg);box-shadow:0 0 20px rgba(204,102,85,.08)}
.wx canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.wx-ct{position:relative;z-index:2}.wx-ic{font-size:32px;margin-bottom:4px}
.wx-nm{font-family:'Noto Serif KR';font-size:14px;font-weight:700;margin-bottom:3px}
.wx-ds{font-size:11px;color:var(--dim);line-height:1.4}
.wx-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;margin-top:6px;display:inline-block}

/* GOODS */
.goods{display:flex;flex-direction:column;gap:8px}
.good{background:var(--card);border:1px solid var(--edge);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(8px);transition:all .3s;position:relative;overflow:hidden}
.good:hover{border-color:rgba(232,200,96,.15)}
.good::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.good-rare::before{background:var(--rare)}.good-epic::before{background:var(--epic)}.good-legend::before{background:var(--legend)}
.good-icon{font-size:26px;flex-shrink:0;width:34px;text-align:center}
.good-info{flex:1}
.good-name{font-size:14px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.good-name .g-rank{font-size:10px;padding:1px 5px;border-radius:4px}
.good-detail{font-size:12px;color:var(--txt2)}
.good-bar-wrap{display:flex;align-items:center;gap:6px;margin-top:5px}
.good-bar{flex:1;height:6px;background:rgba(0,0,0,.25);border-radius:3px;overflow:hidden}
.good-fill{height:100%;border-radius:3px}
.gf-profit{background:linear-gradient(90deg,#448844,#66cc88)}.gf-wait{background:linear-gradient(90deg,#886620,#ccaa44)}.gf-loss{background:linear-gradient(90deg,#884444,#cc6655)}
.good-days{font-size:10px;color:var(--dim);white-space:nowrap}
.good-pnl{font-size:16px;font-weight:900;width:65px;text-align:right;flex-shrink:0}
.good-pnl.win{color:var(--hp)}.good-pnl.lose{color:var(--dmg)}

/* ORDERS */
.ord-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ord-col{background:var(--card);border:1px solid var(--edge);border-radius:14px;padding:14px;backdrop-filter:blur(8px)}
.ord-col h3{font-size:13px;font-weight:700;margin-bottom:8px;text-align:center;padding:5px;border-radius:6px}
.ord-col.buy-c h3{color:var(--mp);background:rgba(85,153,221,.06)}
.ord-col.sell-c h3{color:var(--legend);background:rgba(221,170,68,.06)}
.ord-row{display:flex;justify-content:space-between;padding:7px 10px;margin-bottom:3px;background:rgba(0,0,0,.12);border-radius:6px;border-left:3px solid;font-size:13px}
.buy-c .ord-row{border-color:var(--mp)}.sell-c .ord-row{border-color:var(--legend)}

/* CUSTOMERS */
.cust-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.cust{background:var(--card);border:1px solid var(--edge);border-radius:14px;padding:14px;backdrop-filter:blur(8px);transition:all .3s;position:relative;overflow:hidden}
.cust:hover{transform:translateY(-2px);border-color:rgba(232,200,96,.15)}
.cust::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.cust-s::before{background:var(--hp)}.cust-m::before{background:var(--mp)}.cust-l::before{background:var(--epic)}
.cust-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cust-avatar{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid var(--edge);flex-shrink:0;position:relative}
.cust-tier{position:absolute;top:-4px;right:-4px;font-size:8px;font-weight:900;background:var(--gold);color:var(--sky);padding:1px 4px;border-radius:3px}
.cust-info{flex:1}.cust-name{font-size:13px;font-weight:700;margin-bottom:1px}
.cust-rank{font-size:10px}.cust-rank .cr-stars{color:var(--gold)}
.cust-div{height:1px;background:var(--edge);margin:6px 0}
.cust-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.cust-stat{display:flex;justify-content:space-between;font-size:12px}
.cust-stat .cs-l{color:var(--dim)}.cust-stat .cs-v{font-weight:700}
.cust-bar{height:4px;background:rgba(0,0,0,.25);border-radius:2px;overflow:hidden;margin-top:6px}
.cust-fill{height:100%;border-radius:2px}
.cust-quote{font-size:10px;color:var(--dim);font-style:italic;margin-top:6px;padding:4px 8px;background:rgba(0,0,0,.12);border-radius:6px}

/* DRINKS */
.drink-wrap{background:var(--card);border:1px solid var(--edge);border-radius:16px;padding:18px;backdrop-filter:blur(8px)}
.drink-progress{display:flex;align-items:center;margin-bottom:16px;gap:8px}
.drink-bar{flex:1;height:12px;background:rgba(0,0,0,.25);border-radius:6px;overflow:hidden;border:1px solid var(--edge)}
.drink-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#88bbdd,#ddbb44,#cc6644);transition:width 2s}
.drink-status{font-size:13px;font-weight:700;color:var(--gold)}
.drinks{display:flex;gap:0;align-items:stretch}
.drink{flex:1;text-align:center;padding:12px 6px;position:relative;transition:all .3s;border-radius:12px}
.drink.unlocked{}.drink.locked{opacity:.3;filter:grayscale(.6)}
.drink.current{background:rgba(232,200,96,.06);border:1px solid var(--gold3);box-shadow:0 0 15px rgba(232,200,96,.06)}
.drink-icon{font-size:32px;margin-bottom:4px;display:block}
.drink.current .drink-icon{animation:drinkB 2s ease-in-out infinite}
@keyframes drinkB{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.drink-name{font-size:11px;font-weight:700;margin-bottom:2px}.drink-req{font-size:9px;color:var(--dim)}
.drink-check{position:absolute;top:4px;right:4px;font-size:10px}

/* LOG */
.ledger{background:var(--card);border:1px solid var(--edge);border-radius:14px;overflow:hidden;backdrop-filter:blur(8px)}
.ledger-head{padding:10px 14px;border-bottom:1px solid var(--edge);display:flex;justify-content:space-between;align-items:center}
.ledger-title{font-family:'Noto Serif KR';font-size:14px;color:var(--warm)}
.ledger-btn{background:rgba(0,0,0,.2);border:1px solid var(--edge);color:var(--gold);padding:3px 8px;border-radius:6px;cursor:pointer;font-size:11px}
.ledger-body{padding:10px 14px;max-height:220px;overflow-y:auto;font-size:13px;line-height:1.8}
.ledger-body::-webkit-scrollbar{width:3px}.ledger-body::-webkit-scrollbar-thumb{background:var(--edge);border-radius:2px}
.ll{opacity:0;animation:llin .4s ease forwards}@keyframes llin{to{opacity:1}}
.ll-buy{color:var(--mp)}.ll-sell{color:var(--legend)}.ll-profit{color:var(--hp)}.ll-loss{color:var(--dmg)}.ll-weather{color:var(--frost)}.ll-sys{color:var(--warm)}.ll-dim{color:var(--dim)}.ll-drink{color:#cc8844}

.fab{position:fixed;bottom:20px;right:20px;z-index:50;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--gold2),var(--gold));border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(200,160,60,.25);transition:all .3s}
.fab:hover{transform:scale(1.1)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--sky2);border:1px solid var(--edge);border-radius:18px;padding:24px;width:90%;max-width:360px;position:relative}
.modal h2{font-family:'Noto Serif KR';font-size:17px;color:var(--warm);text-align:center;margin-bottom:18px}
.modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer}
.m-tabs{display:flex;gap:0;margin-bottom:16px}
.m-tab{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;border:1px solid var(--edge);transition:all .3s}
.m-tab:first-child{border-radius:8px 0 0 8px}.m-tab:last-child{border-radius:0 8px 8px 0}
.m-tab.t-buy.on{background:var(--mp);color:#fff;border-color:var(--mp)}
.m-tab.t-sell.on{background:var(--legend);color:#fff;border-color:var(--legend)}
.m-field{margin-bottom:12px}.m-field label{display:block;font-size:12px;color:var(--dim);margin-bottom:3px}
.m-field input{width:100%;padding:11px;background:rgba(0,0,0,.2);border:1px solid var(--edge);border-radius:8px;color:var(--txt);font-size:15px;outline:none}
.m-submit{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.m-submit.buy-btn{background:var(--mp);color:#fff}.m-submit.sell-btn{background:var(--legend);color:#fff}
.m-msg{text-align:center;margin-top:8px;font-size:12px;padding:6px;border-radius:6px}
.m-msg.ok{background:rgba(102,204,136,.08);color:var(--hp)}.m-msg.err{background:rgba(204,102,85,.08);color:var(--dmg)}
footer{text-align:center;padding:18px;color:var(--dim);font-size:10px;border-top:1px solid var(--edge);margin-top:24px}
@media(max-width:640px){.scene-ct{flex-direction:column;align-items:center}.char-card{width:140px}.ord-grid{grid-template-columns:1fr}.wx-grid{grid-template-columns:1fr}.cust-grid{grid-template-columns:1fr}.drinks{flex-wrap:wrap}.skills{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="sky-layer"><canvas id="skyCv"></canvas></div>
<div class="snow-layer"><canvas id="snowCv"></canvas></div>
<div class="content">
<div class="header">
  <h1>❄ 상인 키우기 ❄</h1>
  <div class="h-sub">퀀트로 장사하기</div>
  <div class="hud" id="hud"></div>
</div>
<div class="wrap">
  <div class="refresh" id="refreshBar">마지막 갱신: --<button onclick="loadAll()">🔄 새로고침</button></div>
  <div class="scene"><canvas class="sbg" id="sceneCv"></canvas><div class="scene-glow"></div><div class="scene-ground"></div><div class="scene-ct" id="sceneCt"><div class="loading"><span class="spinner">❄</span>상인의 데이터를 불러오는 중...</div></div></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">⚔ 상인의 능력</span><div class="sec-l"></div></div>
  <div class="skills" id="skills"></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">🌨 오늘 밤 날씨</span><div class="sec-l"></div></div>
  <div class="wx-grid" id="wxGrid"></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">📦 진열된 상품</span><div class="sec-l"></div></div>
  <div class="goods" id="goods"><div class="loading"><span class="spinner">📦</span></div></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">📋 매입·판매 예정</span><div class="sec-l"></div></div>
  <div class="ord-grid" id="orders"><div class="loading"><span class="spinner">📋</span></div></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">🧑‍🤝‍🧑 단골 손님</span><div class="sec-l"></div></div>
  <div class="cust-grid" id="custGrid"></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">☕ 따뜻한 음료 컬렉션</span><div class="sec-l"></div></div>
  <div class="drink-wrap" id="drinkWrap"></div>
  <div class="sec"><div class="sec-l"></div><span class="sec-t">📜 상인의 장부</span><div class="sec-l"></div></div>
  <div class="ledger"><div class="ledger-head"><span class="ledger-title">거래 기록</span><button class="ledger-btn" onclick="loadAll()">🔄</button></div><div class="ledger-body" id="logEl"></div></div>
</div>
<div class="fab" onclick="openModal()">💰</div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal"><button class="modal-close" onclick="closeModal()">✕</button>
    <h2>💰 매입 / 판매</h2>

  document.getElementById('skills').innerHTML=sk.map(function(s){return '<div class="skill"><div class="skill-icon">'+s.ic+'</div><div class="skill-name">'+s.nm+'</div><div class="skill-val" style="color:'+s.c+'">'+s.val+'</div><div class="skill-desc">'+s.desc+'</div><div class="skill-bar"><div class="skill-fill" style="width:'+s.pct+'%;background:'+s.c+'"></div></div></div>'}).join('')}

function renderWeather(){var d=dashData;if(!d)return;
  var modeMap={'천장':'clear','중간':'bliz','바닥':'storm'};var active=modeMap[d.모험.구간]||'clear';
  var ws=[{id:'clear',cls:'wx-clear',ic:'🌙',nm:'맑은 겨울밤',desc:'별빛 아래 장사하기 좋은 밤',badge:'최적',bc:'var(--gold)',bg:'rgba(232,200,96,.06)'},{id:'bliz',cls:'wx-bliz',ic:'🌨',nm:'눈보라',desc:'장사 잠시 쉬어가세요',badge:'주의',bc:'var(--frost)',bg:'rgba(136,187,221,.06)'},{id:'storm',cls:'wx-storm',ic:'⛈',nm:'폭풍설',desc:'가게 문을 닫으세요',badge:'위험',bc:'var(--dmg)',bg:'rgba(204,102,85,.06)'}];
  document.getElementById('wxGrid').innerHTML=ws.map(function(w){return '<div class="wx '+w.cls+(w.id===active?' wa':'')+'"><canvas data-t="'+w.id+'"></canvas><div class="wx-ct"><div class="wx-ic">'+w.ic+'</div><div class="wx-nm" style="color:'+(w.id===active?w.bc:'var(--txt2)')+'">'+w.nm+'</div><div class="wx-ds">'+w.desc+'</div><div class="wx-badge" style="color:'+w.bc+';background:'+w.bg+'">'+(w.id===active?'▶ 현재':w.badge)+'</div></div></div>'}).join('');setTimeout(initWxP,50)}

function renderGoods(){var d=dashData;if(!d||!d.대기물량||!d.대기물량.length){document.getElementById('goods').innerHTML='<div style="text-align:center;padding:20px;color:var(--dim)">📦 상품 없음</div>';return}
  document.getElementById('goods').innerHTML=d.대기물량.map(function(p,i){
    var pnl=typeof p.손익률==='number'?p.손익률:0;var cls=pnl>=0?'win':'lose';
    var days=p.매수일?Math.max(1,Math.round((Date.now()-new Date(p.매수일).getTime())/(1000*60*60*24))):1;
    var pct=Math.min(days/30*100,100);var fC=pnl>0?'gf-profit':pnl>-5?'gf-wait':'gf-loss';
    var rank=getGoodsRank(i+1);var rC=rank==='legend'?'var(--legend)':rank==='epic'?'var(--epic)':'var(--rare)';
    var rL=rank==='legend'?'전설':rank==='epic'?'영웅':'희귀';
    var nm=GOODS_NAMES[i%GOODS_NAMES.length];var em=GOODS_EMOJI[i%GOODS_EMOJI.length];
    var dateStr=p.매수일||'';if(dateStr.length>5)dateStr=dateStr.slice(5);
    return '<div class="good good-'+rank+'"><div class="good-icon">'+em+'</div><div class="good-info"><div class="good-name">'+nm+' <span class="g-rank" style="color:'+rC+';background:'+rC+'15;border:1px solid '+rC+'30">'+rL+'</span></div><div class="good-detail">'+dateStr+' 매입 · $'+p.매수가+' × '+p.수량+'개 · 목표 $'+p.목표가격+'</div><div class="good-bar-wrap"><div class="good-bar"><div class="good-fill '+fC+'" style="width:'+pct+'%"></div></div><div class="good-days">'+days+'일째</div></div></div><div class="good-pnl '+cls+'">'+(pnl>=0?'+':'')+pnl.toFixed(1)+'%</div></div>'}).join('')}

function renderOrders(){var o=ordData;if(!o||o.상태!=='OK')return;
  var bH=o.매수주문&&o.매수주문.length?o.매수주문.map(function(b){return '<div class="ord-row"><span class="o-p" style="color:var(--mp)">$'+b.가격+'</span><span class="o-q">'+b.수량+'개</span></div>'}).join(''):'<div style="text-align:center;padding:12px;color:var(--dim)">없음</div>';
  var sH=o.매도주문&&o.매도주문.length?o.매도주문.map(function(s){return '<div class="ord-row"><span class="o-p" style="color:var(--legend)">$'+s.가격+'</span><span class="o-q">'+s.수량+'개</span></div>'}).join(''):'<div style="text-align:center;padding:12px;color:var(--dim)">없음</div>';
  document.getElementById('orders').innerHTML='<div class="ord-col buy-c"><h3>📥 매입 예정 ('+(o.매수주문?o.매수주문.length:0)+'건)</h3>'+bH+'</div><div class="ord-col sell-c"><h3>📤 판매 예정 ('+(o.매도주문?o.매도주문.length:0)+'건)</h3>'+sH+'</div>'}

function renderCustomers(){
  document.getElementById('custGrid').innerHTML=CUSTS.map(function(c){
    var gc=c.g==='소'?'cust-s':c.g==='중'?'cust-m':'cust-l';var rc=c.g==='소'?'var(--hp)':c.g==='중'?'var(--mp)':'var(--epic)';
    var label=c.g==='소'?'일반 고객':c.g==='중'?'우수 고객':'VIP 고객';
    return '<div class="cust '+gc+'"><div class="cust-top"><div class="cust-avatar" style="background:'+c.bg+'"><span class="cust-tier">T'+c.t+'</span>'+c.e+'</div><div class="cust-info"><div class="cust-name">'+c.nm+'</div><div class="cust-rank"><span class="cr-stars">'+c.별+'</span> <span style="color:'+rc+';font-size:10px">'+label+'</span></div></div></div><div class="cust-div"></div><div class="cust-quote">'+c.대사+'</div></div>'}).join('')}

function renderDrinks(){var d=dashData;if(!d)return;
  var profit=d.계좌.누적실현||0;var curIdx=0;
  DRINKS.forEach(function(dr,i){if(profit>=dr.기준)curIdx=i});
  var next=DRINKS[curIdx+1];
  document.getElementById('drinkWrap').innerHTML=
    '<div class="drink-progress"><span style="font-size:13px">누적 수익 <strong style="color:var(--gold)">$'+profit+'</strong></span>'+
    '<div class="drink-bar"><div class="drink-bar-fill" style="width:'+((curIdx+1)/DRINKS.length*100)+'%"></div></div>'+
    '<span class="drink-status">'+(curIdx+1)+'/'+DRINKS.length+' 해금</span></div>'+
    '<div class="drinks">'+DRINKS.map(function(dr,i){
      var unlocked=profit>=dr.기준;var isCur=i===curIdx;
      var cls=unlocked?(isCur?'unlocked current':'unlocked'):'locked';
      return '<div class="drink '+cls+'"><div class="drink-check">'+(unlocked?'✅':'🔒')+'</div><span class="drink-icon">'+dr.e+'</span><div class="drink-name" style="color:'+(unlocked?'var(--warm)':'var(--dim)')+'">'+dr.nm+'</div><div class="drink-req">'+(dr.기준===0?'시작':dr.기준>=1000?'$'+(dr.기준/1000)+'K':'$'+dr.기준)+'+</div></div>'}).join('')+'</div>'+
    (next?'<div style="text-align:center;margin-top:12px;font-size:12px;color:var(--dim)">다음: '+next.e+' '+next.nm+' — <span style="color:var(--gold)">$'+(next.기준-profit)+'</span> 더 벌면 해금!</div>':'<div style="text-align:center;margin-top:12px;font-size:12px;color:var(--gold)">🏆 모든 음료 해금!</div>')}

function addLog(cls,text){var el=document.getElementById('logEl');var d=document.createElement('div');d.className='ll '+cls;d.textContent=text;el.appendChild(d);el.scrollTop=el.scrollHeight;if(el.children.length>40)el.removeChild(el.firstChild)}

function openModal(){document.getElementById('modalBg').classList.add('open')}
function closeModal(){document.getElementById('modalBg').classList.remove('open');document.getElementById('tMsg').innerHTML=''}
function setTT(t){tradeType=t;document.querySelectorAll('.m-tab').forEach(function(el){el.classList.remove('on')});document.querySelector(t==='buy'?'.t-buy':'.t-sell').classList.add('on');document.getElementById('tSubmit').textContent=t==='buy'?'매입 기록':'판매 기록';document.getElementById('tSubmit').className='m-submit '+(t==='buy'?'buy-btn':'sell-btn')}
async function submitT(){
  var price=document.getElementById('tPrice').value,qty=document.getElementById('tQty').value,msgEl=document.getElementById('tMsg');
  if(!price||!qty){msgEl.innerHTML='<div class="m-msg err">가격과 수량을 입력하세요</div>';return}
  if(API_URL==='YOUR_APPS_SCRIPT_URL_HERE'){msgEl.innerHTML='<div class="m-msg err">API URL 미설정</div>';return}
  msgEl.innerHTML='<div class="m-msg" style="color:var(--dim)">기록 중...</div>';
  try{var r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:tradeType==='buy'?'record_buy':'record_sell',가격:parseFloat(price),수량:parseInt(qty)})});
    var data=await r.json();if(data.상태==='OK'){msgEl.innerHTML='<div class="m-msg ok">✅ '+data.메시지+'</div>';addLog('ll-profit','[체결] '+(tradeType==='buy'?'매입':'판매')+' $'+price+' × '+qty+'개');document.getElementById('tPrice').value='';document.getElementById('tQty').value='';setTimeout(function(){closeModal();loadAll()},2000)}
    else{msgEl.innerHTML='<div class="m-msg err">❌ '+(data.메시지||'오류')+'</div>'}}catch(e){msgEl.innerHTML='<div class="m-msg err">❌ '+e.message+'</div>'}}

loadAll();
</script>
</body>
</html>
