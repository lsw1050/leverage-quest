<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#04060e">
<title>LEVERAGE QUEST</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--void:#04060e;--night:#080c1a;--camp:#0e1424;--earth:#161c32;--stone:#1e2440;--edge:#2a3058;
--gold:#ffcc33;--gold2:#a08020;--gold3:#6a5018;--fire:#ff6b35;--fire2:#ff4400;
--hp:#44cc66;--mp:#3388dd;--crit:#cc55ff;--dmg:#ee4444;--txt:#c0c8e0;--dim:#4a5480}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--void);color:var(--txt);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.03) 2px 4px)}
.pf{font-family:'Press Start 2P',monospace}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.stars canvas{width:100%;height:100%}
.content{position:relative;z-index:1}

/* HUD */
.hud{position:sticky;top:0;z-index:100;background:rgba(4,6,14,.96);border-bottom:2px solid var(--gold3);backdrop-filter:blur(10px);padding:8px 16px}
.hud-top{display:flex;justify-content:space-between;align-items:center;max-width:960px;margin:0 auto;flex-wrap:wrap;gap:6px}
.hud-left{display:flex;align-items:center;gap:8px}
.hud-title{font-family:'Press Start 2P';font-size:clamp(8px,2vw,13px);color:var(--gold);text-shadow:0 0 15px rgba(255,204,51,.3)}
.hud-lv{font-family:'Press Start 2P';font-size:7px;background:var(--gold);color:var(--void);padding:2px 5px;border-radius:3px}
.hud-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.hs{display:flex;align-items:center;gap:2px;font-family:'Press Start 2P';font-size:6px;color:var(--dim)}
.hs-v{color:var(--gold)}
.wrap{max-width:960px;margin:0 auto;padding:12px 16px}
.sec{display:flex;align-items:center;gap:10px;margin:24px 0 12px}
.sec-l{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--edge),transparent)}
.sec-t{font-family:'Press Start 2P';font-size:9px;color:var(--fire);white-space:nowrap;text-shadow:0 0 10px rgba(255,107,53,.15)}

/* LOADING */
.loading{text-align:center;padding:30px;font-family:'Press Start 2P';font-size:9px;color:var(--dim)}
.loading .spinner{font-size:20px;animation:spin 2s ease-in-out infinite;display:block;margin-bottom:10px}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

/* SCENE */
.scene{background:linear-gradient(180deg,var(--night),#0c1020,#10142a);border:2px solid var(--edge);border-radius:16px;position:relative;overflow:hidden;min-height:240px}
.scene::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--fire2),var(--fire),var(--gold),var(--fire),var(--fire2))}
.scene-ground{position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(180deg,#1a1408,#0e0a04);border-top:2px solid #2a1c10}
.scene-glow{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:200px;height:80px;background:radial-gradient(ellipse,rgba(255,107,53,.08),transparent);pointer-events:none;animation:fg 3s ease-in-out infinite}
@keyframes fg{0%,100%{opacity:.4}50%{opacity:.9}}
.scene-ct{position:relative;z-index:2;display:flex;padding:16px 20px 60px;gap:16px;align-items:flex-end;flex-wrap:wrap;justify-content:center}
.sc-char{display:flex;flex-direction:column;align-items:center}
.sc-sprite{width:110px;height:130px;position:relative}
.sc-sprite canvas{image-rendering:pixelated;width:100%;height:100%;filter:drop-shadow(0 0 6px rgba(136,68,204,.2))}
.sc-sprite .lv{position:absolute;top:-4px;right:-4px;background:var(--gold);color:var(--void);font-family:'Press Start 2P';font-size:6px;padding:2px 4px;border-radius:3px}
.sc-fire{width:72px;height:48px;margin-top:-8px}
.sc-fire canvas{image-rendering:pixelated;width:100%;height:100%}
.sc-info{flex:1;min-width:220px}
.si-nm{font-family:'Press Start 2P';font-size:12px;color:#cc55ff;margin-bottom:3px}
.si-cls{font-size:10px;color:var(--dim);margin-bottom:10px}

/* VAULT */
.vault{background:linear-gradient(135deg,#0e0a04,#1a1208,#0e0a04);border:2px solid var(--gold3);border-radius:10px;padding:12px;position:relative;overflow:hidden;margin-bottom:10px}
.vault-sh{position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,204,51,.03),transparent);animation:vsh 5s ease-in-out infinite;pointer-events:none}
@keyframes vsh{0%{left:-100%}100%{left:200%}}
.v-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.v-lbl{font-family:'Press Start 2P';font-size:7px;color:var(--gold3)}
.v-amt{font-family:'Press Start 2P';font-size:clamp(16px,4vw,24px);color:var(--gold);text-shadow:0 0 10px rgba(255,204,51,.2)}
.v-sub{font-size:10px;color:var(--gold2)}
.v-grow{background:#1a2808;color:var(--hp);font-family:'Press Start 2P';font-size:7px;padding:2px 5px;border-radius:3px;margin-left:3px}
.v-neg{background:#280808;color:var(--dmg)}
.pile{height:40px;background:var(--void);border-radius:4px;border:1px solid #1a1408;overflow:hidden;margin:6px 0}
.pile canvas{width:100%;height:100%}
.v-bar{height:8px;background:var(--void);border-radius:3px;overflow:hidden;border:1px solid #1a1408}
.v-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#4a2808,#8a5810,#ccaa30,#ffcc33);transition:width 2s}

/* STAT STRIP */
.ss{display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));gap:4px;margin-top:8px}
.ss-b{background:var(--night);border:1px solid var(--edge);border-radius:5px;padding:6px 3px;text-align:center;position:relative;overflow:hidden}
.ss-b::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.ss-i{font-size:12px}.ss-v{font-family:'Press Start 2P';font-size:clamp(7px,1.2vw,9px)}.ss-l{font-size:7px;color:var(--dim)}

/* ZONES */
.zones{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.zone{border-radius:12px;min-height:120px;cursor:pointer;transition:all .4s;position:relative;overflow:hidden;border:2px solid transparent}
.zone:hover{transform:translateY(-2px)}
.zone.za{transform:scale(1.02)}
.z-fog{background:linear-gradient(180deg,#120a16,#0a0610)}.z-fog.za{border-color:var(--dmg);box-shadow:0 0 20px rgba(238,68,68,.1)}
.z-adv{background:linear-gradient(180deg,#161208,#0e0a04)}.z-adv.za{border-color:var(--gold);box-shadow:0 0 20px rgba(255,204,51,.1)}
.z-vol{background:linear-gradient(180deg,#180a06,#100604)}.z-vol.za{border-color:var(--fire);box-shadow:0 0 20px rgba(255,107,53,.1)}
.zone canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.z-ct{position:relative;z-index:2;padding:10px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
.z-ic{font-size:30px;margin-bottom:4px}.z-nm{font-family:'Press Start 2P';font-size:9px;margin-bottom:3px}
.z-ds{font-size:9px;color:var(--dim);line-height:1.3}.z-badge{font-family:'Press Start 2P';font-size:6px;padding:2px 6px;border-radius:3px;margin-top:5px}

/* ORDERS */
.orders{background:var(--camp);border:2px solid var(--edge);border-radius:14px;padding:16px}
.ord-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ord-col h3{font-family:'Press Start 2P';font-size:8px;margin-bottom:8px;text-align:center;padding:4px;border-radius:4px}
.ord-buy h3{color:var(--mp);background:rgba(51,136,221,.08)}
.ord-sell h3{color:var(--dmg);background:rgba(238,68,68,.08)}
.ord-item{display:flex;justify-content:space-between;padding:5px 8px;margin-bottom:3px;background:var(--night);border-radius:4px;font-size:10px;border-left:3px solid}
.ord-buy .ord-item{border-color:var(--mp)}.ord-sell .ord-item{border-color:var(--dmg)}
.ord-item .price{font-family:'Press Start 2P';font-size:8px}.ord-item .qty{color:var(--dim)}
.ord-empty{text-align:center;padding:12px;color:var(--dim);font-size:10px}

/* POSITIONS */
.explore{background:var(--camp);border:2px solid var(--edge);border-radius:14px;overflow:hidden}
.pos{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(40,48,80,.3);font-size:10px}
.pos:last-child{border-bottom:none}
.pos:hover{background:rgba(255,107,53,.02)}
.pos-date{font-family:'Press Start 2P';font-size:6px;color:var(--dim);width:55px;flex-shrink:0}
.pos-price{font-family:'Press Start 2P';font-size:8px;color:var(--txt);width:50px;flex-shrink:0}
.pos-qty{font-family:'Press Start 2P';font-size:7px;color:var(--mp);width:36px;flex-shrink:0}
.pos-target{font-size:9px;color:var(--gold);flex:1}
.pos-pnl{font-family:'Press Start 2P';font-size:7px;width:50px;text-align:right;flex-shrink:0}
.pos-pnl.win{color:var(--hp)}.pos-pnl.lose{color:var(--dmg)}

/* CODEX */
.cx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.cx{background:var(--camp);border:2px solid var(--edge);border-radius:10px;padding:10px;position:relative;overflow:hidden;transition:all .3s;cursor:pointer}
.cx:hover{transform:translateY(-2px);box-shadow:0 3px 12px rgba(0,0,0,.3)}
.cx::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.cx-s::before{background:var(--hp)}.cx-m::before{background:var(--mp)}.cx-l::before{background:var(--crit)}
.cx-top{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cx-mob{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid rgba(255,255,255,.05);flex-shrink:0}
.cx-i{flex:1}.cx-fl{font-family:'Press Start 2P';font-size:6px;color:var(--fire)}.cx-nm{font-family:'Press Start 2P';font-size:7px;margin:1px 0}.cx-rk{font-size:8px}
.cx-dv{height:1px;background:var(--edge);margin:4px 0}
.cx-dr{margin-top:4px;font-size:7px;color:var(--dim);text-align:center;padding:2px;background:var(--night);border-radius:3px}

/* TRADE MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--camp);border:2px solid var(--gold3);border-radius:16px;padding:24px;width:90%;max-width:380px;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--fire),var(--gold),var(--fire))}
.modal h2{font-family:'Press Start 2P';font-size:12px;color:var(--gold);text-align:center;margin-bottom:16px}
.modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer}
.m-tabs{display:flex;gap:0;margin-bottom:16px}
.m-tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-family:'Press Start 2P';font-size:8px;border:1px solid var(--edge);transition:all .3s}
.m-tab:first-child{border-radius:6px 0 0 6px}.m-tab:last-child{border-radius:0 6px 6px 0}
.m-tab.t-buy.on{background:var(--mp);color:#fff;border-color:var(--mp)}
.m-tab.t-sell.on{background:var(--dmg);color:#fff;border-color:var(--dmg)}
.m-field{margin-bottom:12px}
.m-field label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px}
.m-field input{width:100%;padding:10px;background:var(--night);border:2px solid var(--edge);border-radius:6px;color:var(--txt);font-size:14px;outline:none}
.m-field input:focus{border-color:var(--gold3)}
.m-submit{width:100%;padding:12px;border:none;border-radius:8px;font-family:'Press Start 2P';font-size:10px;cursor:pointer;margin-top:4px}
.m-submit.buy-btn{background:var(--mp);color:#fff}.m-submit.sell-btn{background:var(--dmg);color:#fff}
.m-submit:hover{filter:brightness(1.15)}
.m-msg{text-align:center;margin-top:8px;font-size:11px;padding:6px;border-radius:4px}
.m-msg.ok{background:#1a2808;color:var(--hp)}.m-msg.err{background:#280808;color:var(--dmg)}

/* LOG */
.log-w{background:var(--camp);border:2px solid var(--edge);border-radius:14px;margin-top:16px;overflow:hidden}
.log-h{padding:8px 12px;border-bottom:1px solid var(--edge);display:flex;justify-content:space-between;align-items:center}
.log-t{font-family:'Press Start 2P';font-size:8px;color:var(--fire)}
.log-btn{background:var(--stone);border:1px solid var(--gold3);color:var(--gold);padding:3px 8px;border-radius:3px;cursor:pointer;font-family:'Press Start 2P';font-size:5px}
.log{padding:8px;max-height:200px;overflow-y:auto;font-family:'Press Start 2P';font-size:7px;line-height:2;background:#030408}
.log::-webkit-scrollbar{width:3px}.log::-webkit-scrollbar-thumb{background:var(--edge);border-radius:2px}
.bl{opacity:0;animation:bi .3s ease forwards}@keyframes bi{to{opacity:1}}
.bl-buy{color:var(--mp)}.bl-sell{color:var(--hp)}.bl-mode{color:var(--crit)}.bl-warn{color:var(--dmg)}.bl-gold{color:var(--gold)}.bl-sys{color:var(--fire)}.bl-dim{color:#151a28}

/* FAB */
.trade-fab{position:fixed;bottom:20px;right:20px;z-index:50;width:56px;height:56px;border-radius:50%;
  border:2px solid var(--gold3);background:linear-gradient(135deg,var(--fire),var(--gold));
  display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;
  box-shadow:0 4px 20px rgba(255,107,53,.3);animation:fab 2s ease-in-out infinite}
@keyframes fab{0%,100%{box-shadow:0 4px 20px rgba(255,107,53,.3)}50%{box-shadow:0 4px 30px rgba(255,107,53,.5)}}
.trade-fab:hover{transform:scale(1.1)}

.refresh-bar{text-align:center;padding:6px;font-size:9px;color:var(--dim)}
.refresh-bar button{background:var(--stone);border:1px solid var(--edge);color:var(--gold);padding:3px 8px;border-radius:3px;cursor:pointer;font-size:9px;margin-left:6px}

footer{text-align:center;padding:14px;color:var(--dim);font-size:8px;border-top:1px solid var(--edge);margin-top:20px}
@media(max-width:640px){.scene-ct{flex-direction:column;align-items:center;padding-bottom:70px}
  .ord-grid{grid-template-columns:1fr}.zones{grid-template-columns:1fr}.cx-grid{grid-template-columns:1fr 1fr}}
@media(max-width:400px){.cx-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="stars"><canvas id="sCv"></canvas></div>
<div class="content">

<div class="hud">
  <div class="hud-top">
    <div class="hud-left"><span class="hud-title">🔥 LEVERAGE QUEST</span><span class="hud-lv" id="hudLv">--</span></div>
    <div class="hud-right" id="hudStats"><span class="hs">로딩중...</span></div>
  </div>
</div>

<div class="wrap">
  <div class="refresh-bar" id="refreshBar">마지막 갱신: --<button onclick="loadAll()">🔄 새로고침</button></div>
  <div class="scene" id="scene"><div class="scene-glow"></div><div class="scene-ground"></div>
    <div class="scene-ct" id="sceneCt"><div class="loading"><span class="spinner">🔥</span>야영지 데이터 불러오는 중...</div></div></div>

  <div class="sec"><div class="sec-l"></div><span class="sec-t">🔥 야영지 정찰</span><div class="sec-l"></div></div>
  <div class="zones" id="zones"></div>

  <div class="sec"><div class="sec-l"></div><span class="sec-t">📋 오늘의 주문표</span><div class="sec-l"></div></div>
  <div class="orders" id="orders"><div class="loading"><span class="spinner">📋</span>주문표 불러오는 중...</div></div>

  <div class="sec"><div class="sec-l"></div><span class="sec-t">⚔ 보유 포지션</span><div class="sec-l"></div></div>
  <div class="explore" id="positions"><div class="loading" style="padding:16px"><span class="spinner">⚔</span></div></div>

  <div class="sec"><div class="sec-l"></div><span class="sec-t">📖 몬스터 도감</span><div class="sec-l"></div></div>
  <div class="cx-grid" id="codex"></div>

  <div class="sec"><div class="sec-l"></div><span class="sec-t">📜 모험 기록</span><div class="sec-l"></div></div>
  <div class="log-w"><div class="log-h"><span class="log-t">실시간 기록</span><button class="log-btn" onclick="loadAll()">🔄</button></div><div class="log" id="logEl"></div></div>
</div>

<div class="trade-fab" onclick="openModal()">⚔</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>⚔ 체결 입력</h2>
    <div class="m-tabs">
      <div class="m-tab t-buy on" onclick="setTradeType('buy')">매수 체결</div>
      <div class="m-tab t-sell" onclick="setTradeType('sell')">매도 체결</div>
    </div>
    <div class="m-field"><label>체결 가격 ($)</label><input type="number" id="tradePrice" step="0.01" placeholder="예: 54.59"></div>
    <div class="m-field"><label>체결 수량 (주)</label><input type="number" id="tradeQty" step="1" placeholder="예: 67"></div>
    <button class="m-submit buy-btn" id="tradeSubmit" onclick="submitTrade()">매수 체결 기록</button>
    <div id="tradeMsg"></div>
  </div>
</div>

<footer>⚠ 과거 성과가 미래 수익을 보장하지 않습니다<br>
<span class="pf" style="font-size:5px;color:var(--gold3);margin-top:3px;display:inline-block">LEVERAGE QUEST LIVE</span></footer>
</div>

<script>
// ══════════════════════════════════════════════════
// ⚠️ 아래 URL을 본인의 Apps Script 배포 URL로 교체하세요!
// ══════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbzcnC0z7N2iCLOf1egqJtbb9YGL4NVM5EzbcWyL-DWt8H5y1TTigh73gEnYTSORsnKJ/exec';
// ══════════════════════════════════════════════════

let dashData=null, ordData=null, tradeType='buy';

// ══ JSONP 방식 API 호출 (CORS 완전 우회) ══
function fetchAPI(action) {
  return new Promise(function(resolve) {
    var callbackName = 'jsonp_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    var timeout = setTimeout(function() {
      window[callbackName] = function(){};
      resolve(null);
    }, 15000);

    window[callbackName] = function(data) {
      clearTimeout(timeout);
      resolve(data);
      delete window[callbackName];
      var el = document.getElementById(callbackName);
      if (el) el.remove();
    };

    var script = document.createElement('script');
    script.id = callbackName;
    script.src = API_URL + '?action=' + action + '&callback=' + callbackName;
    script.onerror = function() {
      clearTimeout(timeout);
      resolve(null);
      delete window[callbackName];
      script.remove();
    };
    document.head.appendChild(script);
  });
}

// ══ STARS ══
!function(){var cv=document.getElementById('sCv'),c=cv.getContext('2d');function r(){cv.width=innerWidth*2;cv.height=innerHeight*2}r();addEventListener('resize',r);var s=[];for(var i=0;i<120;i++)s.push({x:Math.random()*4000,y:Math.random()*4000,r:Math.random()*1.5+.2,a:Math.random(),sp:Math.random()*.004+.001});!function d(){c.clearRect(0,0,cv.width,cv.height);s.forEach(function(p){p.a+=p.sp;c.fillStyle='rgba(200,215,255,'+(0.2+0.6*Math.abs(Math.sin(p.a)))+')';c.beginPath();c.arc(p.x,p.y,p.r,0,Math.PI*2);c.fill()});requestAnimationFrame(d)}()}();

// ══ GOLD PILE ══
function drawGP(id,amt,mx){var cv=document.getElementById(id);if(!cv)return;var c=cv.getContext('2d');cv.width=cv.offsetWidth*2;cv.height=80;var W=cv.width,H=cv.height;c.clearRect(0,0,W,H);var pct=Math.min(amt/mx,1),pH=H*pct*.85,nc=Math.floor(pct*70)+10;for(var i=0;i<nc;i++){var x=Math.random()*W*.9+W*.05,y=H-Math.random()*pH+Math.sin(Math.random()*Math.PI)*pH*.1,w=4+Math.random()*4,h=2+Math.random(),b=.5+Math.random()*.5;c.fillStyle='rgba('+Math.floor(200*b)+','+Math.floor(160*b)+','+Math.floor(35*b)+',.9)';c.beginPath();c.ellipse(x,y,w,h,0,0,Math.PI*2);c.fill()}}

function initZP(){document.querySelectorAll('.zone canvas').forEach(function(cv){var ctx=cv.getContext('2d'),t=cv.dataset.t;cv.width=cv.offsetWidth*2;cv.height=cv.offsetHeight*2;var W=cv.width,H=cv.height,ps=[];for(var i=0;i<25;i++)ps.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2.5+.5,vx:(Math.random()-.5)*.3,vy:t==='v'?-Math.random()*1.2-.3:.2,a:Math.random()*.3+.1,l:Math.random()*99});!function d(){ctx.clearRect(0,0,W,H);ps.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.l+=.5;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;var al=p.a*(.5+.5*Math.sin(p.l*.05));if(t==='f'){ctx.fillStyle='rgba(160,120,180,'+al*.2+')';ctx.beginPath();ctx.arc(p.x,p.y,p.r*3,0,Math.PI*2);ctx.fill()}else if(t==='a'){ctx.fillStyle='rgba(255,170,60,'+al*.15+')';ctx.fillRect(p.x,p.y,p.r,p.r)}else{ctx.fillStyle='rgba(255,50,0,'+al*.4+')';ctx.beginPath();ctx.arc(p.x,p.y,p.r*1.5,0,Math.PI*2);ctx.fill()}});requestAnimationFrame(d)}()})}

// ══ FORMAT ══
function fG(v){if(!v&&v!==0)return '--';v=Number(v);return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v.toFixed(0)}
function fW(v){if(!v)return '';var w=v*1450;return w>=1e8?'약 '+(w/1e8).toFixed(0)+'억원':'약 '+(w/1e4).toFixed(0)+'만원'}
function fP(v){if(!v&&v!==0)return '--';return (v>=0?'+':'')+v.toFixed(2)+'%'}

  document.getElementById('refreshBar').innerHTML=

}

function renderPositions(){
  var d=dashData;if(!d)return;
  var list=d.대기물량||[];
  if(!list.length){document.getElementById('positions').innerHTML='<div class="ord-empty" style="padding:16px">보유 포지션 없음</div>';return;}
  document.getElementById('positions').innerHTML=list.map(function(p){
    var pnl=typeof p.손익률==='number'?p.손익률:0;
    var cls=pnl>=0?'win':'lose';
    var dateStr=p.매수일||'';
    if(dateStr.length>5) dateStr=dateStr.slice(5);
    return '<div class="pos">'+
    '<div class="pos-date">'+dateStr+'</div>'+
    '<div class="pos-price">$'+p.매수가+'</div>'+
    '<div class="pos-qty">'+p.수량+'주</div>'+
    '<div class="pos-target">→ $'+p.목표가격+'</div>'+
    '<div class="pos-pnl '+cls+'">'+(pnl>=0?'+':'')+pnl.toFixed(1)+'%</div></div>';
  }).join('');
}

function renderCodex(){
  document.getElementById('codex').innerHTML=MONS.map(function(m){

}

  var price=document.getElementById('tradePrice').value;
  var qty=document.getElementById('tradeQty').value;
  var msgEl=document.getElementById('tradeMsg');
  if(!price||!qty){msgEl.innerHTML='<div class="m-msg err">가격과 수량을 입력하세요</div>';return;}
  if(API_URL==='YOUR_APPS_SCRIPT_URL_HERE'){msgEl.innerHTML='<div class="m-msg err">API URL 미설정</div>';return;}
  msgEl.innerHTML='<div class="m-msg" style="color:var(--dim)">기록 중...</div>';
  try{
    var r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:tradeType==='buy'?'record_buy':'record_sell',가격:parseFloat(price),수량:parseInt(qty)})});
    var data=await r.json();
    if(data.상태==='OK'){
      msgEl.innerHTML='<div class="m-msg ok">✅ '+data.메시지+'</div>';
      addLog('bl-gold','[체결] '+(tradeType==='buy'?'매수':'매도')+' $'+price+' × '+qty+'주');
      document.getElementById('tradePrice').value='';
      document.getElementById('tradeQty').value='';
      setTimeout(function(){closeModal();loadAll()},2000);
    } else {
      msgEl.innerHTML='<div class="m-msg err">❌ '+(data.메시지||'오류')+'</div>';
    }
  }catch(e){msgEl.innerHTML='<div class="m-msg err">❌ '+e.message+'</div>'}
}

// ══ INIT ══
loadAll();
</script>
</body>
</html>
